name: CI — Credit Risk Modeling

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data and models directories
        run: |
          mkdir -p data models

      - name: Execute preprocessing notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=120 \
            notebooks/04_data_preprocessing.ipynb

      - name: Check for syntax errors in src/
        run: |
          python -m py_compile src/*.py 2>/dev/null || echo "No .py files in src/ to check"

      - name: Verify preprocessed data files exist
        run: |
          python -c "
          import os
          files = [
              'data/X_train_processed.npy',
              'data/X_test_processed.npy',
              'data/y_train.npy',
              'data/y_test.npy',
              'data/feature_names.npy',
              'models/preprocessor.pkl'
          ]
          for f in files:
              assert os.path.exists(f), f'Missing: {f}'
              print(f'OK: {f}')
          print('All output files present.')
          "
